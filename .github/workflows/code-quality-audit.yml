name: Code quality audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript, ESLint, and production build
        shell: bash
        env:
          NEXT_PUBLIC_SITE_URL: https://tutticancerwarriors.org
        run: |
          set +e

          npm run typecheck 2>&1 | tee typecheck.log
          TYPECHECK_STATUS=${PIPESTATUS[0]}

          npm run lint 2>&1 | tee lint.log
          LINT_STATUS=${PIPESTATUS[0]}

          npm run build 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}

          echo "TypeScript exit code: $TYPECHECK_STATUS"
          echo "ESLint exit code: $LINT_STATUS"
          echo "Build exit code: $BUILD_STATUS"

          if [ "$TYPECHECK_STATUS" -ne 0 ] || [ "$LINT_STATUS" -ne 0 ] || [ "$BUILD_STATUS" -ne 0 ]; then
            exit 1
          fi
